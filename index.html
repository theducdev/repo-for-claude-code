<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #multiplier-badge {
      display: none;
      padding: 2px 8px;
      background: #facc15;
      color: #000;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 1px;
      animation: pulse-badge 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse-badge {
      from { opacity: 0.8; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.08); }
    }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #22c55e; }

    #bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 404px;
      gap: 8px;
    }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    #wrap-toggle {
      padding: 4px 12px;
      background: #1a1a1a;
      color: #555;
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    #wrap-toggle.on {
      color: #4ade80;
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.08);
    }

    /* ── Changelog tab ── */
    #changelog-panel {
      width: 404px;
    }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date {
      font-size: 0.7rem;
      color: #444;
    }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #333;
    }

    .cl-items li.new::before { color: #4ade80; }
    .cl-items li.fix::before { content: '✦'; color: #facc15; }
    .cl-items li.change::before { content: '◆'; color: #60a5fa; }

    .cl-by {
      margin-top: 8px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
      &nbsp;&nbsp;
      <span id="multiplier-badge">2× BONUS</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="bottom-bar">
      <div id="controls">Arrow Keys / WASD · P = Pause</div>
      <button id="wrap-toggle">WRAP: OFF</button>
    </div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history — maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog data ──────────────────────────────────────────────
    const CHANGELOG = [
      {
        version: "v1.3",
        date: "2026-04-22 14:00",
        items: [
          { type: "new", text: "Pause/Resume — nhấn P để tạm dừng và tiếp tục chơi" },
          { type: "new", text: "Power-up ⭐ xuất hiện sau mỗi 5 miếng ăn, nhặt để nhân đôi điểm 10 giây" },
          { type: "new", text: "Wall Wrap mode — nút toggle: rắn xuyên tường thay vì thua khi chạm biên" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle bùng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles có màu sắc ngẫu nhiên, trọng lực và fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Thêm tab Changelog để theo dõi lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog có thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake trên web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    // ── Render changelog ────────────────────────────────────────────
    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── Tab switching ───────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const btn = document.getElementById('btn');
    const multiplierBadge = document.getElementById('multiplier-badge');
    const wrapToggleBtn = document.getElementById('wrap-toggle');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;
    const POWERUP_EVERY = 5;   // spawn powerup after every N foods
    const MULTIPLIER_MS = 10000; // 2× bonus lasts 10 seconds

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles;
    let paused, gameRunning;
    let powerup, powerupDeadline, foodCount;
    let multiplierDeadline;
    let wrapMode = false;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    // ── Wall Wrap toggle ────────────────────────────────────────────
    wrapToggleBtn.addEventListener('click', () => {
      wrapMode = !wrapMode;
      wrapToggleBtn.textContent = wrapMode ? 'WRAP: ON' : 'WRAP: OFF';
      wrapToggleBtn.classList.toggle('on', wrapMode);
    });

    // ── Helpers ─────────────────────────────────────────────────────
    function randCell(exclude) {
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (exclude.some(p => p[0] === pos[0] && p[1] === pos[1]));
      return pos;
    }

    // ── Particle system ─────────────────────────────────────────────
    function spawnParticles(gx, gy, golden = false) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      const count = golden ? 20 : 14;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
        const spd = (golden ? 2.5 : 1.8) + Math.random() * 2.8;
        const hue = golden ? (45 + Math.random() * 20) : (Math.random() * 60 + 10);
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          hue,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Star shape for power-up ─────────────────────────────────────
    function drawStar(cx, cy, spikes, outerR, innerR) {
      let rot = -Math.PI / 2;
      const step = Math.PI / spikes;
      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        ctx.lineTo(cx + Math.cos(rot) * r, cy + Math.sin(rot) * r);
        rot += step;
      }
      ctx.closePath();
    }

    // ── Game lifecycle ──────────────────────────────────────────────
    function startGame() {
      snake = [[Math.floor(COLS / 2), Math.floor(ROWS / 2)]];
      dir = [1, 0];
      nextDir = [1, 0];
      food = randCell(snake);
      score = 0;
      speed = 120;
      particles = [];
      paused = false;
      gameRunning = true;
      powerup = null;
      powerupDeadline = 0;
      foodCount = 0;
      multiplierDeadline = 0;
      scoreEl.textContent = 0;
      multiplierBadge.style.display = 'none';
      overlay.style.display = 'none';
      if (loopId) clearTimeout(loopId);
      loop();
    }

    function loop() {
      update();
      draw();
      loopId = setTimeout(loop, speed);
    }

    function update() {
      if (paused) return;

      dir = nextDir;
      let head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

      // Wall collision — wrap or die
      if (wrapMode) {
        head = [(head[0] + COLS) % COLS, (head[1] + ROWS) % ROWS];
      } else {
        if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return endGame();
      }

      if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return endGame();

      snake.unshift(head);

      const now = Date.now();
      const activeMultiplier = now < multiplierDeadline ? 2 : 1;

      if (head[0] === food[0] && head[1] === food[1]) {
        score += 10 * activeMultiplier;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snake_best', best);
        }
        spawnParticles(food[0], food[1], false);
        food = randCell([...snake, ...(powerup ? [powerup] : [])]);
        speed = Math.max(60, speed - 2);
        foodCount++;

        // Spawn power-up every POWERUP_EVERY foods if none active
        if (foodCount % POWERUP_EVERY === 0 && !powerup) {
          powerup = randCell([...snake, food]);
          powerupDeadline = now + 7000; // disappears after 7s
        }
      } else if (powerup && head[0] === powerup[0] && head[1] === powerup[1]) {
        // Collected power-up — no snake growth, just bonus
        snake.pop();
        spawnParticles(powerup[0], powerup[1], true);
        multiplierDeadline = now + MULTIPLIER_MS;
        multiplierBadge.style.display = 'inline-block';
        powerup = null;
      } else {
        snake.pop();
      }

      // Expire power-up if not collected in time
      if (powerup && now > powerupDeadline) powerup = null;

      // Expire multiplier badge
      if (activeMultiplier === 1 && multiplierBadge.style.display !== 'none') {
        multiplierBadge.style.display = 'none';
      }

      updateParticles();
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      drawParticles();

      // Food
      const [fx, fy] = food;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(fx * CELL + CELL / 2, fy * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Power-up star (pulsing)
      if (powerup) {
        const [px, py] = powerup;
        const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 180);
        const glow = ctx.createRadialGradient(
          px * CELL + CELL / 2, py * CELL + CELL / 2, 0,
          px * CELL + CELL / 2, py * CELL + CELL / 2, CELL
        );
        glow.addColorStop(0, `rgba(250,204,21,${pulse * 0.4})`);
        glow.addColorStop(1, 'rgba(250,204,21,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(px * CELL - CELL, py * CELL - CELL, CELL * 3, CELL * 3);

        ctx.fillStyle = `rgba(250, 204, 21, ${pulse})`;
        ctx.shadowColor = '#facc15';
        ctx.shadowBlur = 8 * pulse;
        drawStar(px * CELL + CELL / 2, py * CELL + CELL / 2, 5, CELL / 2 - 1, CELL / 4);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Snake
      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? '#4ade80'
          : `hsl(${140 - ratio * 40}, 70%, ${50 - ratio * 15}%)`;
        ctx.beginPath();
        ctx.roundRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });

      // Wrap mode indicator (top-left corner)
      if (wrapMode) {
        ctx.fillStyle = 'rgba(74,222,128,0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(74,222,128,0.5)';
        ctx.font = '10px Segoe UI';
        ctx.fillText('WRAP', 6, 14);
      }

      // Pause overlay drawn on canvas
      if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#facc15';
        ctx.font = 'bold 30px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = '13px Segoe UI';
        ctx.fillStyle = '#888';
        ctx.fillText('Press P to resume', canvas.width / 2, canvas.height / 2 + 18);
        ctx.textAlign = 'left';
      }
    }

    function endGame() {
      clearTimeout(loopId);
      gameRunning = false;
      paused = false;
      powerup = null;
      multiplierBadge.style.display = 'none';
      overlayTitle.textContent = 'GAME OVER';
      overlaySub.textContent = `Score: ${score}`;
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      // Pause toggle
      if (e.key === 'p' || e.key === 'P') {
        if (!gameRunning) return;
        paused = !paused;
        if (!paused) loop();
        else {
          clearTimeout(loopId);
          draw(); // show pause frame immediately
        }
        return;
      }

      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });
  </script>
</body>
</html>
