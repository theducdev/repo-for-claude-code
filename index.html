<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
    }

    #tagline {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-top: -8px;
    }

    #tagline .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #22c55e; }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    /* ── D-pad ── */
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }

    #dpad button {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #aaa;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, transform 0.08s;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    #dpad button:active {
      background: #4ade80;
      color: #000;
      transform: scale(0.92);
    }

    #dpad .dpad-empty {
      background: transparent;
      border: none;
      pointer-events: none;
    }

    /* ── High Score Board ── */
    #highscore-board {
      width: 404px;
    }

    .hs-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hs-clear-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #333;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .hs-clear-btn:hover { color: #f87171; border-color: #f87171; }

    .hs-table {
      width: 100%;
      border-collapse: collapse;
    }

    .hs-table tr {
      border-bottom: 1px solid #1a1a1a;
    }

    .hs-table tr:last-child { border-bottom: none; }

    .hs-table td {
      padding: 7px 10px;
      font-size: 0.8rem;
    }

    .hs-rank {
      color: #333;
      width: 28px;
      text-align: center;
      font-weight: bold;
    }

    .hs-rank.gold   { color: #facc15; }
    .hs-rank.silver { color: #94a3b8; }
    .hs-rank.bronze { color: #c2844a; }

    .hs-score {
      color: #4ade80;
      font-weight: bold;
      font-size: 0.9rem;
      min-width: 60px;
    }

    .hs-date {
      color: #444;
      font-size: 0.7rem;
      text-align: right;
    }

    .hs-empty {
      text-align: center;
      color: #333;
      padding: 16px;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    .hs-new-badge {
      display: inline-block;
      background: #4ade80;
      color: #000;
      font-size: 0.6rem;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      animation: fadeBadge 3s forwards;
    }

    @keyframes fadeBadge {
      0%, 70% { opacity: 1; }
      100%     { opacity: 0; }
    }

    /* ── Changelog tab ── */
    #changelog-panel {
      width: 404px;
    }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date {
      font-size: 0.7rem;
      color: #444;
    }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before {
      content: '\2192';
      position: absolute;
      left: 0;
      color: #333;
    }

    .cl-items li.new::before { color: #4ade80; }
    .cl-items li.fix::before { content: '\2726'; color: #facc15; }
    .cl-items li.change::before { content: '\25C6'; color: #60a5fa; }

    .cl-by {
      margin-top: 8px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <p id="tagline"><span class="dot"></span>Coded by AI · Operated by AI · New features ship continuously</p>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="controls">Arrow Keys / WASD · Swipe on canvas · D-pad below</div>

    <div id="dpad">
      <div class="dpad-empty"></div>
      <button id="btn-up" aria-label="Up">&#9650;</button>
      <div class="dpad-empty"></div>
      <button id="btn-left" aria-label="Left">&#9664;</button>
      <div class="dpad-empty"></div>
      <button id="btn-right" aria-label="Right">&#9654;</button>
      <div class="dpad-empty"></div>
      <button id="btn-down" aria-label="Down">&#9660;</button>
      <div class="dpad-empty"></div>
    </div>

    <!-- High Score Board -->
    <div id="highscore-board">
      <div class="hs-header">
        <span>Top Scores</span>
        <button class="hs-clear-btn" id="hs-clear">Clear</button>
      </div>
      <table class="hs-table" id="hs-table"></table>
    </div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history — maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog data ──────────────────────────────────────────────
    // Claude updates this array each time a new feature is shipped.
    const CHANGELOG = [
      {
        version: "v1.4",
        date: "2026-04-21 15:35",
        items: [
          { type: "new", text: "High Score Board: lưu top 5 điểm cao nhất vào localStorage" },
          { type: "new", text: "Hiển thị huy hiệu NEW khi lập kỷ lục mới" },
          { type: "new", text: "Nút Clear để xóa bảng điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.3",
        date: "2026-04-21 15:21",
        items: [
          { type: "new", text: "Mobile touch controls: vuốt trên canvas để đổi hướng" },
          { type: "new", text: "On-screen D-pad (4 nút mũi tên) hoạt động trên mọi thiết bị" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle bùng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles có màu sắc ngẫu nhiên, trọng lực và fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Thêm tab Changelog để theo dõi lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog có thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake trên web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    // ── Render changelog ────────────────────────────────────────────
    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── Tab switching ───────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // ── High Score Board ────────────────────────────────────────────
    const HS_KEY = 'snake_highscores';
    const HS_MAX = 5;
    let lastNewRankIndex = -1;

    function loadScores() {
      try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; }
      catch { return []; }
    }

    function saveScore(s) {
      if (s <= 0) return -1;
      const scores = loadScores();
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      scores.push({ score: s, date: dateStr });
      scores.sort((a, b) => b.score - a.score);
      const trimmed = scores.slice(0, HS_MAX);
      localStorage.setItem(HS_KEY, JSON.stringify(trimmed));
      return trimmed.findIndex(e => e.score === s && e.date === dateStr);
    }

    function renderScores(newIdx) {
      const scores = loadScores();
      const table = document.getElementById('hs-table');
      const rankClass = ['gold', 'silver', 'bronze'];
      if (scores.length === 0) {
        table.innerHTML = `<tr><td class="hs-empty">No scores yet — play a game!</td></tr>`;
        return;
      }
      table.innerHTML = scores.map((e, i) => `
        <tr>
          <td class="hs-rank ${rankClass[i] || ''}">${i + 1}</td>
          <td class="hs-score">${e.score}${
            i === newIdx ? '<span class="hs-new-badge">NEW</span>' : ''
          }</td>
          <td class="hs-date">${e.date}</td>
        </tr>
      `).join('');
    }

    document.getElementById('hs-clear').addEventListener('click', () => {
      localStorage.removeItem(HS_KEY);
      renderScores(-1);
    });

    renderScores(-1);

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const btn = document.getElementById('btn');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles, gameRunning;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    function randFood(snake) {
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (snake.some(s => s[0] === pos[0] && s[1] === pos[1]));
      return pos;
    }

    // ── Particle system ─────────────────────────────────────────────
    function spawnParticles(gx, gy) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      const count = 14;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
        const spd = 1.8 + Math.random() * 2.8;
        const hue = Math.random() * 60 + 10;
        particles.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          hue,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function startGame() {
      snake = [[Math.floor(COLS/2), Math.floor(ROWS/2)]];
      dir = [1, 0];
      nextDir = [1, 0];
      food = randFood(snake);
      score = 0;
      speed = 120;
      particles = [];
      scoreEl.textContent = 0;
      gameRunning = true;
      overlay.style.display = 'none';
      if (loopId) clearTimeout(loopId);
      loop();
    }

    function loop() {
      update();
      draw();
      loopId = setTimeout(loop, speed);
    }

    function update() {
      dir = nextDir;
      const head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

      if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return endGame();
      if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return endGame();

      snake.unshift(head);

      if (head[0] === food[0] && head[1] === food[1]) {
        score += 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snake_best', best);
        }
        spawnParticles(food[0], food[1]);
        food = randFood(snake);
        speed = Math.max(60, speed - 2);
      } else {
        snake.pop();
      }

      updateParticles();
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
      }

      drawParticles();

      const [fx, fy] = food;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(fx*CELL + CELL/2, fy*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
      ctx.fill();

      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? '#4ade80'
          : `hsl(${140 - ratio*40}, 70%, ${50 - ratio*15}%)`;
        ctx.beginPath();
        ctx.roundRect(x*CELL + 1, y*CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function endGame() {
      gameRunning = false;
      clearTimeout(loopId);
      const newIdx = saveScore(score);
      renderScores(newIdx);
      overlayTitle.textContent = 'GAME OVER';
      overlaySub.textContent = `Score: ${score}`;
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (!gameRunning || d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });

    // ── Touch swipe on canvas ───────────────────────────────────────
    let touchStartX = 0, touchStartY = 0;

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      if (!gameRunning) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 15) return;
      const d = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? DIRS.ArrowRight : DIRS.ArrowLeft)
        : (dy > 0 ? DIRS.ArrowDown  : DIRS.ArrowUp);
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    }, { passive: false });

    // ── D-pad buttons ───────────────────────────────────────────────
    function applyDir(key) {
      const d = DIRS[key];
      if (!gameRunning || !d || (d[0] === -dir[0] && d[1] === -dir[1])) return;
      nextDir = d;
    }

    document.getElementById('btn-up').addEventListener('click',    () => applyDir('ArrowUp'));
    document.getElementById('btn-down').addEventListener('click',  () => applyDir('ArrowDown'));
    document.getElementById('btn-left').addEventListener('click',  () => applyDir('ArrowLeft'));
    document.getElementById('btn-right').addEventListener('click', () => applyDir('ArrowRight'));
  </script>
</body>
</html>
