<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #22c55e; }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    #portal-indicator {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      transition: color 0.2s;
    }
    #portal-indicator.active { color: #a78bfa; }

    /* ── Changelog tab ── */
    #changelog-panel {
      width: 404px;
    }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date {
      font-size: 0.7rem;
      color: #444;
    }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #333;
    }

    .cl-items li.new::before { color: #4ade80; }
    .cl-items li.fix::before { content: '✦'; color: #facc15; }
    .cl-items li.change::before { content: '◆'; color: #60a5fa; }

    .cl-by {
      margin-top: 8px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;&middot;&nbsp; P = Portal Mode</div>
    <div id="portal-indicator">Portal: OFF</div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history — maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog data ───────────────────────────────────────────────
    const CHANGELOG = [
      {
        version: "v1.3",
        date: "2026-04-21 16:00",
        items: [
          { type: "new", text: "Portal Mode: nhấn P để bật/tắt — rắn xuyên tường ra cạnh đối diện" },
          { type: "new", text: "Power-ups: thức ăn đặc biệt (⚡ tăng tốc 5s, ⭐ +30 điểm) xuất hiện ngẫu nhiên" },
          { type: "new", text: "Combo System: ăn liên tiếp nhanh nhận x2/x3 điểm, hiển thị streak trên canvas" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle bùng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles có màu sắc ngẫu nhiên, trọng lực và fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Thêm tab Changelog để theo dõi lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog có thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake trên web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    // ── Render changelog ─────────────────────────────────────────────
    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── Tab switching ──────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const btn = document.getElementById('btn');
    const portalIndicator = document.getElementById('portal-indicator');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles;
    let portalMode = false;

    // Power-up state
    let powerUp = null;
    let powerUpTimer = null;
    let powerUpSpeedActive = false;
    let powerUpSpeedEnd = 0;

    // Combo state
    let comboCount = 0;
    let lastEatTime = 0;
    const COMBO_WINDOW = 2500;
    let comboDisplay = null;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    function randCell(snk, exclude) {
      exclude = exclude || [];
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (
        snk.some(s => s[0] === pos[0] && s[1] === pos[1]) ||
        exclude.some(e => e && e[0] === pos[0] && e[1] === pos[1])
      );
      return pos;
    }

    function randFood(snk) {
      return randCell(snk, powerUp ? [[powerUp.x, powerUp.y]] : []);
    }

    // ── Power-up system ──────────────────────────────────────────
    function schedulePowerUp() {
      clearTimeout(powerUpTimer);
      const delay = 10000 + Math.random() * 8000;
      powerUpTimer = setTimeout(spawnPowerUp, delay);
    }

    function spawnPowerUp() {
      if (powerUp) return;
      const type = Math.random() < 0.5 ? 'speed' : 'bonus';
      const pos = randCell(snake, [[food[0], food[1]]]);
      powerUp = { x: pos[0], y: pos[1], type, expiresAt: Date.now() + 6000 };
    }

    function checkPowerUpExpiry() {
      if (powerUp && Date.now() > powerUp.expiresAt) {
        powerUp = null;
        schedulePowerUp();
      }
    }

    // ── Particle system ──────────────────────────────────────────
    function spawnParticles(gx, gy) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      const count = 14;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
        const spd = 1.8 + Math.random() * 2.8;
        const hue = Math.random() * 60 + 10;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1, hue,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.12; p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Combo system ──────────────────────────────────────────────
    function getComboMultiplier() {
      if (comboCount >= 5) return 3;
      if (comboCount >= 3) return 2;
      return 1;
    }

    function triggerCombo(gx, gy) {
      const now = Date.now();
      if (now - lastEatTime <= COMBO_WINDOW) {
        comboCount++;
      } else {
        comboCount = 1;
      }
      lastEatTime = now;

      const multi = getComboMultiplier();
      if (comboCount >= 3) {
        comboDisplay = {
          text: comboCount >= 5 ? 'x3 COMBO!' : 'x2 COMBO!',
          x: gx * CELL + CELL / 2,
          y: gy * CELL - 4,
          life: 1.0,
          color: comboCount >= 5 ? '#f97316' : '#facc15',
        };
      }
      return multi;
    }

    function updateComboDisplay() {
      if (!comboDisplay) return;
      comboDisplay.y -= 0.8;
      comboDisplay.life -= 0.02;
      if (comboDisplay.life <= 0) comboDisplay = null;
    }

    function drawComboDisplay() {
      if (!comboDisplay) return;
      ctx.globalAlpha = comboDisplay.life;
      ctx.fillStyle = comboDisplay.color;
      ctx.font = 'bold 14px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(comboDisplay.text, comboDisplay.x, comboDisplay.y);
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    function startGame() {
      snake = [[Math.floor(COLS/2), Math.floor(ROWS/2)]];
      dir = [1, 0];
      nextDir = [1, 0];
      food = randFood(snake);
      score = 0;
      speed = 120;
      particles = [];
      powerUp = null;
      powerUpSpeedActive = false;
      comboCount = 0;
      lastEatTime = 0;
      comboDisplay = null;
      scoreEl.textContent = 0;
      overlay.style.display = 'none';
      if (loopId) clearTimeout(loopId);
      schedulePowerUp();
      loop();
    }

    function loop() {
      update();
      draw();
      const effectiveSpeed = (powerUpSpeedActive && Date.now() < powerUpSpeedEnd)
        ? Math.max(30, Math.floor(speed / 1.6))
        : speed;
      loopId = setTimeout(loop, effectiveSpeed);
    }

    function update() {
      dir = nextDir;
      let nx = snake[0][0] + dir[0];
      let ny = snake[0][1] + dir[1];

      if (portalMode) {
        nx = (nx + COLS) % COLS;
        ny = (ny + ROWS) % ROWS;
      } else {
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return endGame();
      }

      const head = [nx, ny];
      if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return endGame();

      snake.unshift(head);

      checkPowerUpExpiry();

      // Power-up collision
      if (powerUp && head[0] === powerUp.x && head[1] === powerUp.y) {
        const pu = powerUp;
        powerUp = null;
        spawnParticles(head[0], head[1]);
        schedulePowerUp();
        if (pu.type === 'speed') {
          powerUpSpeedActive = true;
          powerUpSpeedEnd = Date.now() + 5000;
        } else {
          score += 30;
          scoreEl.textContent = score;
          if (score > best) {
            best = score;
            bestEl.textContent = best;
            localStorage.setItem('snake_best', best);
          }
        }
        updateParticles();
        updateComboDisplay();
        return;
      }

      if (head[0] === food[0] && head[1] === food[1]) {
        const multi = triggerCombo(food[0], food[1]);
        score += 10 * multi;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snake_best', best);
        }
        spawnParticles(food[0], food[1]);
        food = randFood(snake);
        speed = Math.max(60, speed - 2);
      } else {
        snake.pop();
      }

      updateParticles();
      updateComboDisplay();
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (portalMode) {
        ctx.strokeStyle = '#7c3aed';
        ctx.lineWidth = 3;
        ctx.strokeRect(1.5, 1.5, canvas.width - 3, canvas.height - 3);
      }

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
      }

      drawParticles();

      // Speed boost tint
      if (powerUpSpeedActive && Date.now() < powerUpSpeedEnd) {
        const remaining = (powerUpSpeedEnd - Date.now()) / 5000;
        ctx.fillStyle = `rgba(96, 165, 250, ${0.1 * remaining})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (powerUpSpeedActive) {
        powerUpSpeedActive = false;
      }

      // Food
      const [fx, fy] = food;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(fx*CELL + CELL/2, fy*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
      ctx.fill();

      // Power-up (pulsing)
      if (powerUp) {
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
        const r = CELL/2 - 2 + pulse * 2;
        ctx.fillStyle = powerUp.type === 'speed' ? '#60a5fa' : '#facc15';
        ctx.beginPath();
        ctx.arc(powerUp.x*CELL + CELL/2, powerUp.y*CELL + CELL/2, r, 0, Math.PI*2);
        ctx.fill();
        ctx.font = `bold ${CELL - 6}px Segoe UI`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#000';
        ctx.fillText(powerUp.type === 'speed' ? '⚡' : '⭐', powerUp.x*CELL + CELL/2, powerUp.y*CELL + CELL/2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }

      // Snake
      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? '#4ade80'
          : `hsl(${140 - ratio*40}, 70%, ${50 - ratio*15}%)`;
        ctx.beginPath();
        ctx.roundRect(x*CELL + 1, y*CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });

      drawComboDisplay();

      // Combo streak HUD
      if (comboCount >= 3) {
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = comboCount >= 5 ? '#f97316' : '#facc15';
        ctx.font = 'bold 11px Segoe UI';
        ctx.textAlign = 'left';
        ctx.fillText(`COMBO x${getComboMultiplier()} (${comboCount} streak)`, 6, 14);
        ctx.globalAlpha = 1;
      }
    }

    function endGame() {
      clearTimeout(loopId);
      clearTimeout(powerUpTimer);
      overlayTitle.textContent = 'GAME OVER';
      overlaySub.textContent = `Score: ${score}`;
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        portalMode = !portalMode;
        portalIndicator.textContent = `Portal: ${portalMode ? 'ON' : 'OFF'}`;
        portalIndicator.classList.toggle('active', portalMode);
        return;
      }
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });
  </script>
</body>
</html>
