<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="scores">Scores</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;&middot;&nbsp; <kbd>P</kbd> or <kbd>Esc</kbd> to Pause</div>
  </div>

  <!-- Scores tab -->
  <div id="scores-panel" class="tab-panel">
    <p class="cl-header">Top Scores &mdash; Local Leaderboard</p>
    <div id="scores-list"></div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history &mdash; maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
