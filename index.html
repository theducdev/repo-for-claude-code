<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #22c55e; }

    /* ── HUD below canvas ── */
    #game-hud {
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 24px;
    }

    #combo-display {
      font-size: 0.85rem;
      font-weight: bold;
      color: #fb923c;
      letter-spacing: 2px;
      min-width: 90px;
      text-align: center;
    }

    #pause-indicator {
      font-size: 0.8rem;
      font-weight: bold;
      color: #facc15;
      letter-spacing: 2px;
      min-width: 90px;
      text-align: center;
    }

    #wrap-toggle {
      padding: 4px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #555;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #wrap-toggle.on {
      border-color: #4ade80;
      color: #4ade80;
    }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    /* ── Changelog tab ── */
    #changelog-panel {
      width: 404px;
    }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date {
      font-size: 0.7rem;
      color: #444;
    }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before {
      content: '\2192';
      position: absolute;
      left: 0;
      color: #333;
    }

    .cl-items li.new::before { color: #4ade80; }
    .cl-items li.fix::before { content: '\2736'; color: #facc15; }
    .cl-items li.change::before { content: '\25C6'; color: #60a5fa; }

    .cl-by {
      margin-top: 8px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="game-hud">
      <span id="combo-display"></span>
      <span id="pause-indicator"></span>
      <button id="wrap-toggle" class="on">WRAP: ON</button>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;&middot;&nbsp; T = Wrap &nbsp;&middot;&nbsp; Space / P = Pause</div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history &mdash; maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog ──────────────────────────────────────────────────
    const CHANGELOG = [
      {
        version: "v1.4",
        date: "2026-04-23 22:00",
        items: [
          { type: "new", text: "Pause / Resume bằng ph\xedm Space hoặc P" },
          { type: "new", text: "Shrink food (kim cương xanh): ăn để cắt 4 đốt đu\xf4i, nhận +15 điểm" },
          { type: "new", text: "Screen shake + viền đỏ khi chết: phản hồi va chạm trực quan mạnh mẽ" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.3",
        date: "2026-04-22 15:00",
        items: [
          { type: "new", text: "Wall wrap-around: rắn xuy\xean tường thay v\xec chết, toggle bằng T hoặc n\xfat WRAP" },
          { type: "new", text: "Power-up food (sao v\xe0ng): xuất hiện định kỳ, +30 điểm v\xe0 giảm tốc 50 tick" },
          { type: "new", text: "Combo multiplier: ăn li\xean tiếp nhanh tăng hệ số x2 → x3 → x4" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle b\xf9ng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles c\xf3 m\xe0u sắc ngẫu nhi\xean, trọng lực v\xe0 fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Th\xeam tab Changelog để theo d\xf5i lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog c\xf3 thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake tr\xean web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── Tab switching ───────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const btn = document.getElementById('btn');
    const comboDisplay = document.getElementById('combo-display');
    const pauseIndicator = document.getElementById('pause-indicator');
    const wrapBtn = document.getElementById('wrap-toggle');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles;
    let powerUp, powerUpCooldown;
    let slowBonus, slowTimer;
    let comboCount, comboTimer;
    let wrapMode = true;
    let shrinkFood, shrinkCooldown;  // shrinkFood = [x, y, life]
    let paused, gameRunning;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    // ── Wrap toggle ─────────────────────────────────────────────────
    function setWrap(val) {
      wrapMode = val;
      wrapBtn.textContent = `WRAP: ${wrapMode ? 'ON' : 'OFF'}`;
      if (wrapMode) wrapBtn.classList.add('on');
      else wrapBtn.classList.remove('on');
    }
    wrapBtn.addEventListener('click', () => setWrap(!wrapMode));

    // ── Helpers ─────────────────────────────────────────────────────
    function randCell(exclude) {
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (exclude.some(([ex, ey]) => ex === pos[0] && ey === pos[1]));
      return pos;
    }

    // ── Particle system ─────────────────────────────────────────────
    function spawnParticles(gx, gy, baseHue) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      baseHue = (baseHue !== undefined) ? baseHue : 10;
      for (let i = 0; i < 14; i++) {
        const angle = (Math.PI * 2 * i) / 14 + (Math.random() - 0.5) * 0.6;
        const spd = 1.8 + Math.random() * 2.8;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          hue: baseHue + Math.random() * 50,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.12; p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Game init ───────────────────────────────────────────────────
    function startGame() {
      snake = [[Math.floor(COLS / 2), Math.floor(ROWS / 2)]];
      dir = [1, 0]; nextDir = [1, 0];
      food = randCell(snake);
      score = 0; speed = 120;
      particles = [];
      powerUp = null; powerUpCooldown = 100;
      slowBonus = 0; slowTimer = 0;
      comboCount = 0; comboTimer = 0;
      shrinkFood = null; shrinkCooldown = 80;
      paused = false; gameRunning = true;
      scoreEl.textContent = 0;
      comboDisplay.textContent = '';
      pauseIndicator.textContent = '';
      canvas.style.transform = '';
      canvas.style.borderColor = '';
      overlay.style.display = 'none';
      if (loopId) clearTimeout(loopId);
      loop();
    }

    function loop() {
      if (!paused && gameRunning) update();
      if (!paused) draw();
      if (gameRunning) loopId = setTimeout(loop, speed + slowBonus);
    }

    // ── Pause ───────────────────────────────────────────────────────
    function togglePause() {
      if (!gameRunning) return;
      paused = !paused;
      if (paused) {
        clearTimeout(loopId);
        pauseIndicator.textContent = '⏸ PAUSED';
        drawPauseOverlay();
      } else {
        pauseIndicator.textContent = '';
        loop();
      }
    }

    function drawPauseOverlay() {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#facc15';
      ctx.font = 'bold 30px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 16);
      ctx.fillStyle = '#555';
      ctx.font = '13px "Segoe UI", sans-serif';
      ctx.fillText('Space / P to resume', canvas.width / 2, canvas.height / 2 + 16);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    // ── Update ──────────────────────────────────────────────────────
    function update() {
      dir = nextDir;
      let hx = snake[0][0] + dir[0];
      let hy = snake[0][1] + dir[1];

      if (wrapMode) {
        hx = ((hx % COLS) + COLS) % COLS;
        hy = ((hy % ROWS) + ROWS) % ROWS;
      } else {
        if (hx < 0 || hx >= COLS || hy < 0 || hy >= ROWS) return endGame();
      }

      if (snake.some(([sx, sy]) => sx === hx && sy === hy)) return endGame();

      const head = [hx, hy];
      snake.unshift(head);

      if (slowTimer > 0) { slowTimer--; if (slowTimer === 0) slowBonus = 0; }
      if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) comboCount = 0; }

      let ate = false;

      // Power-up collision
      if (powerUp && head[0] === powerUp.x && head[1] === powerUp.y) {
        ate = true;
        score += 30;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
        spawnParticles(powerUp.x, powerUp.y);
        powerUp = null;
        powerUpCooldown = 120;
        slowBonus = 70;
        slowTimer = 50;
      }

      // Shrink food collision
      if (shrinkFood && head[0] === shrinkFood[0] && head[1] === shrinkFood[1]) {
        ate = true;
        const toRemove = Math.min(4, snake.length - 1);
        if (toRemove > 0) snake.splice(snake.length - toRemove, toRemove);
        score += 15;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
        spawnParticles(shrinkFood[0], shrinkFood[1], 200);
        shrinkFood = null;
        shrinkCooldown = 90;
      }

      // Regular food collision
      if (head[0] === food[0] && head[1] === food[1]) {
        ate = true;
        const mult = Math.min(comboCount + 1, 4);
        comboCount = Math.min(comboCount + 1, 3);
        comboTimer = 22;
        score += 10 * mult;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
        spawnParticles(food[0], food[1]);
        food = randCell([
          ...snake,
          ...(powerUp ? [[powerUp.x, powerUp.y]] : []),
          ...(shrinkFood ? [shrinkFood] : []),
        ]);
        speed = Math.max(60, speed - 2);
      }

      if (!ate) snake.pop();

      // Power-up lifecycle
      if (powerUp) {
        powerUp.life--;
        if (powerUp.life <= 0) { powerUp = null; powerUpCooldown = 120; }
      } else if (powerUpCooldown > 0) {
        powerUpCooldown--;
      } else {
        const p = randCell([...snake, food, ...(shrinkFood ? [shrinkFood] : [])]);
        powerUp = { x: p[0], y: p[1], life: 80 };
      }

      // Shrink food lifecycle
      if (shrinkFood) {
        shrinkFood[2]--;
        if (shrinkFood[2] <= 0) { shrinkFood = null; shrinkCooldown = 90; }
      } else if (shrinkCooldown > 0) {
        shrinkCooldown--;
      } else {
        const pos = randCell([...snake, food, ...(powerUp ? [[powerUp.x, powerUp.y]] : [])]);
        shrinkFood = [pos[0], pos[1], 80];
      }

      updateParticles();

      if (comboCount >= 1 && comboTimer > 0) {
        comboDisplay.textContent = `COMBO x${Math.min(comboCount + 1, 4)}`;
      } else {
        comboDisplay.textContent = '';
      }
    }

    // ── Draw ────────────────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (slowTimer > 0) {
        ctx.fillStyle = 'rgba(96, 165, 250, 0.07)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      drawParticles();

      // Regular food
      const [fx, fy] = food;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(fx * CELL + CELL / 2, fy * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Power-up (rotating 4-pointed star)
      if (powerUp) {
        const cx = powerUp.x * CELL + CELL / 2;
        const cy = powerUp.y * CELL + CELL / 2;
        const t = Date.now() / 400;
        const r = CELL / 2 - 1 + Math.sin(t * 3) * 1.5;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(t * 0.8);
        ctx.globalAlpha = 0.5 + 0.5 * (powerUp.life / 80);
        ctx.shadowColor = '#facc15';
        ctx.shadowBlur = 10 + Math.sin(t * 3) * 4;
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = (i * Math.PI) / 4;
          const len = i % 2 === 0 ? r : r * 0.42;
          if (i === 0) ctx.moveTo(Math.cos(angle) * len, Math.sin(angle) * len);
          else ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
        }
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Shrink food (blue rotating diamond)
      if (shrinkFood) {
        const cx = shrinkFood[0] * CELL + CELL / 2;
        const cy = shrinkFood[1] * CELL + CELL / 2;
        const t = Date.now() / 500;
        const r = CELL / 2 - 2 + Math.sin(t * 5) * 1.5;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(t * 0.5);
        ctx.globalAlpha = 0.4 + 0.6 * (shrinkFood[2] / 80);
        ctx.shadowColor = '#60a5fa';
        ctx.shadowBlur = 8 + Math.sin(t * 5) * 3;
        ctx.fillStyle = '#60a5fa';
        ctx.beginPath();
        ctx.moveTo(0, -r);
        ctx.lineTo(r * 0.65, 0);
        ctx.lineTo(0, r);
        ctx.lineTo(-r * 0.65, 0);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Snake
      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? '#4ade80'
          : `hsl(${140 - ratio * 40}, 70%, ${50 - ratio * 15}%)`;
        ctx.beginPath();
        ctx.roundRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function endGame() {
      clearTimeout(loopId);
      gameRunning = false;
      paused = false;
      comboDisplay.textContent = '';
      pauseIndicator.textContent = '';

      let frames = 10;
      let intensity = 7;
      canvas.style.borderColor = '#ef4444';

      function shakeStep() {
        if (frames <= 0) {
          canvas.style.transform = '';
          canvas.style.borderColor = '';
          overlayTitle.textContent = 'GAME OVER';
          overlaySub.textContent = `Score: ${score}`;
          btn.textContent = 'PLAY AGAIN';
          overlay.style.display = 'flex';
          return;
        }
        canvas.style.transform = `translate(${(Math.random() - 0.5) * intensity * 2}px, ${(Math.random() - 0.5) * intensity * 2}px)`;
        frames--;
        intensity *= 0.8;
        setTimeout(shakeStep, 35);
      }
      shakeStep();
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePause();
        return;
      }
      if (e.key === 't' || e.key === 'T') { setWrap(!wrapMode); return; }
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });
  </script>
</body>
</html>
