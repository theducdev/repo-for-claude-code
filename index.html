<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #22c55e; }

    /* ── Pause overlay ── */
    #pause-overlay {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      gap: 8px;
      pointer-events: none;
    }

    #pause-overlay.active { display: flex; }

    #pause-overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 6px;
      color: #60a5fa;
    }

    #pause-overlay p {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 2px;
    }

    /* ── Combo display ── */
    #combo-display {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 1rem;
      font-weight: bold;
      color: #facc15;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(250,204,21,0.7);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #combo-display.active { opacity: 1; }

    #combo-display.pulse {
      animation: comboPop 0.15s ease-out;
    }

    @keyframes comboPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    /* ── Changelog tab ── */
    #changelog-panel {
      width: 404px;
    }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date {
      font-size: 0.7rem;
      color: #444;
    }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before {
      content: '\2192';
      position: absolute;
      left: 0;
      color: #333;
    }

    .cl-items li.new::before { color: #4ade80; }
    .cl-items li.fix::before { content: '\2746'; color: #facc15; }
    .cl-items li.change::before { content: '\25C6'; color: #60a5fa; }

    .cl-by {
      margin-top: 8px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>

      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>

      <div id="pause-overlay">
        <h2>PAUSED</h2>
        <p>PRESS P TO RESUME</p>
      </div>

      <div id="combo-display">x1</div>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;·&nbsp; P to pause</div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history — maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog data ──────────────────────────────────────────────
    const CHANGELOG = [
      {
        version: "v1.3",
        date: "2026-04-22 15:00",
        items: [
          { type: "new", text: "Bonus golden food: xuất hiện ngẫu nhiên, tồn tại 5 giây, cho 30 điểm" },
          { type: "new", text: "Combo multiplier: ăn liên tiếp trong 2.5s để nhân điểm (tối đa x5)" },
          { type: "new", text: "Pause / Resume: nhấn P để tạm dừng và tiếp tục" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle bùng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles có màu sắc ngẫu nhiên, trọng lực và fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Thêm tab Changelog để theo dõi lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog có thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake trên web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    // ── Render changelog ────────────────────────────────────────────
    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── Tab switching ───────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const btn = document.getElementById('btn');
    const pauseOverlay = document.getElementById('pause-overlay');
    const comboDisplay = document.getElementById('combo-display');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles;
    let gameRunning = false;
    let isPaused = false;

    // Bonus food: null | { pos: [x, y], timeLeft: ms }
    let bonusFood = null;
    let bonusSpawnTimer = 0;
    const BONUS_SPAWN_MIN   = 12000;
    const BONUS_SPAWN_RANGE = 8000;
    const BONUS_DURATION    = 5000;
    const BONUS_POINTS      = 30;

    // Combo
    let combo = 1;
    let comboTimer = 0;
    const COMBO_WINDOW = 2500;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    function randPos(excludeList) {
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (excludeList.some(e => e && e[0] === pos[0] && e[1] === pos[1]));
      return pos;
    }

    // ── Particle system ─────────────────────────────────────────────
    function spawnParticles(gx, gy, hueBase) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      for (let i = 0; i < 14; i++) {
        const angle = (Math.PI * 2 * i) / 14 + (Math.random() - 0.5) * 0.6;
        const spd = 1.8 + Math.random() * 2.8;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          hue: hueBase + Math.random() * 40,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.12; p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Combo system ────────────────────────────────────────────────
    function refreshComboUI() {
      if (combo <= 1) {
        comboDisplay.classList.remove('active');
      } else {
        comboDisplay.textContent = 'x' + combo;
        comboDisplay.classList.add('active');
        comboDisplay.classList.remove('pulse');
        void comboDisplay.offsetWidth;
        comboDisplay.classList.add('pulse');
      }
    }

    function handleEat(isBonus) {
      const base = isBonus ? BONUS_POINTS : 10;
      const gained = base * combo;
      score += gained;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snake_best', best);
      }
      // Increment combo for next eat if within window
      if (comboTimer > 0 && combo < 5) combo++;
      else if (comboTimer <= 0) combo = 1;
      comboTimer = COMBO_WINDOW;
      refreshComboUI();
    }

    // ── Pause ────────────────────────────────────────────────────────
    function togglePause() {
      if (!gameRunning) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearTimeout(loopId);
        pauseOverlay.classList.add('active');
      } else {
        pauseOverlay.classList.remove('active');
        loop();
      }
    }

    // ── Start / restart ──────────────────────────────────────────────
    function startGame() {
      snake = [[Math.floor(COLS / 2), Math.floor(ROWS / 2)]];
      dir = [1, 0];
      nextDir = [1, 0];
      food = randPos([]);
      score = 0;
      speed = 120;
      particles = [];
      bonusFood = null;
      bonusSpawnTimer = BONUS_SPAWN_MIN + Math.random() * BONUS_SPAWN_RANGE;
      combo = 1;
      comboTimer = 0;
      gameRunning = true;
      isPaused = false;
      scoreEl.textContent = 0;
      comboDisplay.classList.remove('active');
      overlay.style.display = 'none';
      pauseOverlay.classList.remove('active');
      if (loopId) clearTimeout(loopId);
      loop();
    }

    function loop() {
      update();
      draw();
      loopId = setTimeout(loop, speed);
    }

    function update() {
      dir = nextDir;
      const head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

      if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return endGame();
      if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return endGame();

      snake.unshift(head);

      let ate = false;

      if (head[0] === food[0] && head[1] === food[1]) {
        handleEat(false);
        spawnParticles(food[0], food[1], 10);
        food = randPos([...snake, bonusFood && bonusFood.pos]);
        speed = Math.max(60, speed - 2);
        ate = true;
      } else if (bonusFood && head[0] === bonusFood.pos[0] && head[1] === bonusFood.pos[1]) {
        handleEat(true);
        spawnParticles(bonusFood.pos[0], bonusFood.pos[1], 45);
        bonusFood = null;
        bonusSpawnTimer = BONUS_SPAWN_MIN + Math.random() * BONUS_SPAWN_RANGE;
        speed = Math.max(60, speed - 2);
        ate = true;
      }

      if (!ate) snake.pop();

      // Combo timer decay
      if (comboTimer > 0) {
        comboTimer -= speed;
        if (comboTimer <= 0) {
          combo = 1;
          comboTimer = 0;
          refreshComboUI();
        }
      }

      // Bonus food lifecycle
      if (bonusFood) {
        bonusFood.timeLeft -= speed;
        if (bonusFood.timeLeft <= 0) {
          bonusFood = null;
          bonusSpawnTimer = BONUS_SPAWN_MIN + Math.random() * BONUS_SPAWN_RANGE;
        }
      } else {
        bonusSpawnTimer -= speed;
        if (bonusSpawnTimer <= 0) {
          bonusFood = {
            pos: randPos([...snake, food]),
            timeLeft: BONUS_DURATION,
          };
        }
      }

      updateParticles();
    }

    function draw() {
      const now = Date.now();

      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      drawParticles();

      // Regular food
      const [fx, fy] = food;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(fx * CELL + CELL / 2, fy * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Bonus food
      if (bonusFood) {
        const [bx, by] = bonusFood.pos;
        const cx = bx * CELL + CELL / 2;
        const cy = by * CELL + CELL / 2;
        const pulse = Math.sin(now / 150) * 0.12 + 0.88;
        const r = (CELL / 2 - 2) * pulse;

        // Outer glow
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + 8);
        grad.addColorStop(0, 'rgba(250,204,21,0.35)');
        grad.addColorStop(1, 'rgba(250,204,21,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
        ctx.fill();

        // Gold circle
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        // Countdown arc (white ring shrinks as time runs out)
        const progress = bonusFood.timeLeft / BONUS_DURATION;
        ctx.strokeStyle = 'rgba(255,255,255,0.65)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, CELL / 2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
        ctx.stroke();

        // Star icon
        ctx.fillStyle = '#78350f';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', cx, cy);
      }

      // Snake
      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? '#4ade80'
          : `hsl(${140 - ratio * 40}, 70%, ${50 - ratio * 15}%)`;
        ctx.beginPath();
        ctx.roundRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function endGame() {
      clearTimeout(loopId);
      gameRunning = false;
      isPaused = false;
      combo = 1;
      comboTimer = 0;
      comboDisplay.classList.remove('active');
      pauseOverlay.classList.remove('active');
      overlayTitle.textContent = 'GAME OVER';
      overlaySub.textContent = `Score: ${score}`;
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePause();
        return;
      }
      if (isPaused) return;
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });
  </script>
</body>
</html>
