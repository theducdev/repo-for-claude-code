<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    #overlay button:hover { opacity: 0.85; }

    /* ── Theme selector ── */
    #theme-selector {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #theme-selector label {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 4px;
    }

    .theme-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .theme-btn.active { border-color: #fff; transform: scale(1.25); }
    .theme-btn:hover:not(.active) { transform: scale(1.1); }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    /* ── Scores tab ── */
    #scores-panel { width: 404px; }

    .sc-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .sc-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .sc-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .sc-rank {
      font-size: 0.85rem;
      font-weight: bold;
      color: #333;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .sc-rank.gold   { color: #fbbf24; }
    .sc-rank.silver { color: #94a3b8; }
    .sc-rank.bronze { color: #cd7f5e; }

    .sc-score {
      font-size: 1rem;
      font-weight: bold;
      color: #4ade80;
    }

    .sc-date {
      font-size: 0.7rem;
      color: #444;
      margin-left: auto;
    }

    .sc-empty {
      font-size: 0.8rem;
      color: #333;
      letter-spacing: 1px;
      text-align: center;
      padding: 32px 0;
    }

    /* ── Changelog tab ── */
    #changelog-panel { width: 404px; }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date { font-size: 0.7rem; color: #444; }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before   { content: '\2192'; position: absolute; left: 0; color: #333; }
    .cl-items li.new::before    { color: #4ade80; }
    .cl-items li.fix::before    { content: '\2726'; color: #facc15; }
    .cl-items li.change::before { content: '\25C6'; color: #60a5fa; }

    .cl-by { margin-top: 8px; font-size: 0.65rem; color: #333; letter-spacing: 1px; }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="scores">Scores</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="theme-selector">
      <label>Theme:</label>
      <button class="theme-btn active" data-theme="classic" style="background:#4ade80" title="Classic"></button>
      <button class="theme-btn"        data-theme="neon"    style="background:#00d4ff" title="Neon"></button>
      <button class="theme-btn"        data-theme="retro"   style="background:#fbbf24" title="Retro"></button>
      <button class="theme-btn"        data-theme="mono"    style="background:#e2e8f0" title="Mono"></button>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;·&nbsp; P to pause</div>
  </div>

  <!-- Scores tab -->
  <div id="scores-panel" class="tab-panel">
    <p class="sc-header">Top 5 high scores</p>
    <div class="sc-list" id="sc-list"></div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history — maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog data ──────────────────────────────────────────────
    // Claude updates this array each time a new feature is shipped.
    const CHANGELOG = [
      {
        version: "v1.3",
        date: "2026-04-21 16:00",
        items: [
          { type: "new", text: "Color themes: Classic / Neon / Retro / Mono" },
          { type: "new", text: "Pause game bằng phím P (hoặc click Resume)" },
          { type: "new", text: "High score board — lưu top 5 điểm cao nhất" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle bùng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles có màu sắc ngẫu nhiên, trọng lực và fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Thêm tab Changelog để theo dõi lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog có thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake trên web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    // ── Themes ──────────────────────────────────────────────────────
    const THEMES = {
      classic: { snake: '#4ade80', snakeHue: 140, food: '#f87171', bg: '#111',    grid: '#1a1a1a' },
      neon:    { snake: '#00d4ff', snakeHue: 190, food: '#ff6b9d', bg: '#0a0a1a', grid: '#12122a' },
      retro:   { snake: '#fbbf24', snakeHue:  45, food: '#f97316', bg: '#1a0f00', grid: '#241500' },
      mono:    { snake: '#e2e8f0', snakeHue: 215, food: '#94a3b8', bg: '#0f172a', grid: '#1e293b' },
    };

    let currentTheme = localStorage.getItem('snake_theme') || 'classic';

    function applyTheme(name) {
      currentTheme = name;
      localStorage.setItem('snake_theme', name);
      const t = THEMES[name];
      document.querySelector('h1').style.color = t.snake;
      const btn = document.getElementById('btn');
      if (btn) btn.style.background = t.snake;
      document.querySelectorAll('.theme-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.theme === name);
      });
    }

    document.querySelectorAll('.theme-btn').forEach(b => {
      b.addEventListener('click', () => applyTheme(b.dataset.theme));
    });

    // ── Render changelog ────────────────────────────────────────────
    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── High score board ────────────────────────────────────────────
    let highScores = JSON.parse(localStorage.getItem('snake_hiscores') || '[]');

    function renderScores() {
      const scList = document.getElementById('sc-list');
      scList.innerHTML = '';
      if (highScores.length === 0) {
        scList.innerHTML = '<div class="sc-empty">No scores yet — play a game!</div>';
        return;
      }
      const rankClass = ['gold', 'silver', 'bronze'];
      highScores.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'sc-entry';
        el.innerHTML = `
          <span class="sc-rank ${rankClass[i] || ''}">#${i + 1}</span>
          <span class="sc-score">${s.score}</span>
          <span class="sc-date">${s.date}</span>
        `;
        scList.appendChild(el);
      });
    }

    function saveScore(pts) {
      const now = new Date();
      const p = n => String(n).padStart(2, '0');
      const dateStr = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;
      highScores.push({ score: pts, date: dateStr });
      highScores.sort((a, b) => b.score - a.score);
      highScores = highScores.slice(0, 5);
      localStorage.setItem('snake_hiscores', JSON.stringify(highScores));
      renderScores();
    }

    renderScores();

    // ── Tab switching ───────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub   = document.getElementById('overlay-sub');
    const btn = document.getElementById('btn');

    const CELL = 20;
    const COLS = canvas.width  / CELL;
    const ROWS = canvas.height / CELL;

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles, paused, running;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    function randFood(sn) {
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (sn.some(s => s[0] === pos[0] && s[1] === pos[1]));
      return pos;
    }

    // ── Particle system ─────────────────────────────────────────────
    function spawnParticles(gx, gy) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      const count = 14;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
        const spd = 1.8 + Math.random() * 2.8;
        const hue = Math.random() * 60 + 10;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1, hue,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.12; p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Game flow ────────────────────────────────────────────────────
    function startGame() {
      snake = [[Math.floor(COLS/2), Math.floor(ROWS/2)]];
      dir = [1, 0]; nextDir = [1, 0];
      food = randFood(snake);
      score = 0; speed = 120;
      particles = [];
      paused = false; running = true;
      scoreEl.textContent = 0;
      overlay.style.display = 'none';
      clearTimeout(loopId);
      loop();
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      loopId = setTimeout(loop, speed);
    }

    function update() {
      dir = nextDir;
      const head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

      if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return endGame();
      if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return endGame();

      snake.unshift(head);

      if (head[0] === food[0] && head[1] === food[1]) {
        score += 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snake_best', best);
        }
        spawnParticles(food[0], food[1]);
        food = randFood(snake);
        speed = Math.max(60, speed - 2);
      } else {
        snake.pop();
      }

      updateParticles();
    }

    function draw() {
      const t = THEMES[currentTheme];

      ctx.fillStyle = t.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = t.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
      }

      drawParticles();

      const [fx, fy] = food;
      ctx.fillStyle = t.food;
      ctx.beginPath();
      ctx.arc(fx*CELL + CELL/2, fy*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
      ctx.fill();

      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? t.snake
          : `hsl(${t.snakeHue - ratio*40}, 70%, ${50 - ratio*15}%)`;
        ctx.beginPath();
        ctx.roundRect(x*CELL + 1, y*CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      if (paused) {
        clearTimeout(loopId);
        overlayTitle.textContent = 'PAUSED';
        overlaySub.textContent   = 'Press P to resume';
        btn.textContent = 'RESUME';
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = 'none';
        loop();
      }
    }

    function endGame() {
      running = false; paused = false;
      clearTimeout(loopId);
      if (score > 0) saveScore(score);
      overlayTitle.textContent = 'GAME OVER';
      overlaySub.textContent   = `Score: ${score}`;
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', () => {
      if (paused) togglePause();
      else startGame();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePause();
        return;
      }
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });

    // Apply saved theme on load
    applyTheme(currentTheme);
  </script>
</body>
</html>
