<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="scores">Scores</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <div class="diff-row">
          <span class="diff-label">Difficulty</span>
          <div class="diff-btns">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn selected" data-diff="normal">Normal</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
        </div>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="theme-selector">
      <label>Theme:</label>
      <button class="theme-btn active" data-theme="classic" style="background:#4ade80" title="Classic"></button>
      <button class="theme-btn"        data-theme="neon"    style="background:#00d4ff" title="Neon"></button>
      <button class="theme-btn"        data-theme="retro"   style="background:#fbbf24" title="Retro"></button>
      <button class="theme-btn"        data-theme="mono"    style="background:#e2e8f0" title="Mono"></button>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;&middot;&nbsp; P to pause</div>
  </div>

  <!-- Scores tab -->
  <div id="scores-panel" class="tab-panel">
    <p class="sc-header">Top 5 high scores</p>
    <div class="sc-list" id="sc-list"></div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history &mdash; maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
