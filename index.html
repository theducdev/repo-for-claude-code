<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #4ade80;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #2a2a2a;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { color: #aaa; }

    .tab-panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* ── Game tab ── */
    #scoreboard {
      display: flex;
      gap: 40px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: bold; }

    #canvas-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      gap: 10px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #facc15;
    }

    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

    #overlay button {
      margin-top: 6px;
      padding: 10px 32px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #22c55e; }

    #overlay-rank {
      font-size: 0.8rem;
      color: #facc15;
      letter-spacing: 1px;
      min-height: 1.2em;
    }

    #controls { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    /* ── Mode bar ── */
    #mode-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-btn {
      padding: 5px 14px;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      background: transparent;
      color: #555;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .mode-btn.on {
      border-color: #4ade80;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.08);
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.15);
    }

    .theme-btn { border-radius: 20px; }
    .theme-btn.active { border-color: #60a5fa; color: #60a5fa; background: rgba(96,165,250,0.08); }

    /* ── Scores tab ── */
    #scores-panel { width: 404px; }

    .score-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .score-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px 14px;
    }

    .score-rank {
      font-size: 1rem;
      font-weight: bold;
      color: #333;
      width: 24px;
      text-align: center;
    }

    .score-row:nth-child(1) .score-rank { color: #fbbf24; }
    .score-row:nth-child(2) .score-rank { color: #9ca3af; }
    .score-row:nth-child(3) .score-rank { color: #cd7c2f; }

    .score-val {
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      flex: 1;
    }

    .score-empty {
      font-size: 0.8rem;
      color: #333;
      letter-spacing: 1px;
      text-align: center;
      padding: 24px 0;
    }

    /* ── Changelog tab ── */
    #changelog-panel { width: 404px; }

    .cl-header {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cl-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cl-list::-webkit-scrollbar { width: 4px; }
    .cl-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 2px; }
    .cl-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cl-entry {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .cl-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cl-version {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 1px;
    }

    .cl-date { font-size: 0.7rem; color: #444; }

    .cl-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cl-items li {
      font-size: 0.8rem;
      color: #aaa;
      padding-left: 14px;
      position: relative;
    }

    .cl-items li::before { content: '\2192'; position: absolute; left: 0; color: #333; }
    .cl-items li.new::before { color: #4ade80; }
    .cl-items li.fix::before { content: '\2726'; color: #facc15; }
    .cl-items li.change::before { content: '\25C6'; color: #60a5fa; }

    .cl-by { margin-top: 8px; font-size: 0.65rem; color: #333; letter-spacing: 1px; }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="tabs">
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="scores">Scores</button>
    <button class="tab-btn" data-tab="changelog">Changelog</button>
  </div>

  <!-- Game tab -->
  <div id="game-panel" class="tab-panel active">
    <div id="scoreboard">
      Score: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Best: <span id="best">0</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">SNAKE</h2>
        <p id="overlay-sub">Use Arrow Keys or WASD</p>
        <div id="overlay-rank"></div>
        <button id="btn">PLAY</button>
      </div>
    </div>

    <div id="mode-bar">
      <button class="mode-btn" id="wrap-btn">&#x27F3; Wrap</button>
      <button class="mode-btn theme-btn active" data-theme="classic">Classic</button>
      <button class="mode-btn theme-btn" data-theme="neon">Neon</button>
      <button class="mode-btn theme-btn" data-theme="ocean">Ocean</button>
    </div>

    <div id="controls">Arrow Keys / WASD &nbsp;·&nbsp; Space / P = pause &nbsp;·&nbsp; Gold = +50 pts</div>
  </div>

  <!-- Scores tab -->
  <div id="scores-panel" class="tab-panel">
    <p class="score-header">Top scores — stored locally</p>
    <div class="score-list" id="score-list"></div>
  </div>

  <!-- Changelog tab -->
  <div id="changelog-panel" class="tab-panel">
    <p class="cl-header">Update history &mdash; maintained by Claude</p>
    <div class="cl-list" id="cl-list"></div>
  </div>

  <script>
    // ── Changelog data ──────────────────────────────────────────────
    const CHANGELOG = [
      {
        version: "v1.4",
        date: "2026-04-21 18:00",
        items: [
          { type: "new", text: "Pause: nhấn Space hoặc P để tạm dừng/tiếp tục" },
          { type: "new", text: "High Score Board: lưu top 5 điểm cao nhất, có tab riêng" },
          { type: "new", text: "Color Themes: Classic / Neon / Ocean — đổi màu toàn bộ game" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.3",
        date: "2026-04-21 15:30",
        items: [
          { type: "new", text: "Wrap mode: bật để rắn xuyên tường, xuất hiện phía bên kia" },
          { type: "new", text: "Power-up vàng xuất hiện ngẫu nhiên sau khi ăn mồi, ăn được +50 điểm" },
          { type: "new", text: "Combo streak: ăn mồi liên tiếp trong 3.5s được nhân điểm 2x → 3x" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.2",
        date: "2026-04-21 15:00",
        items: [
          { type: "new", text: "Hiệu ứng particle bùng nổ khi rắn ăn mồi" },
          { type: "new", text: "Particles có màu sắc ngẫu nhiên, trọng lực và fade-out mượt" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.1",
        date: "2026-04-21 08:30",
        items: [
          { type: "new", text: "Thêm tab Changelog để theo dõi lịch sử cập nhật" },
          { type: "new", text: "Tab Game / Changelog có thể chuyển đổi" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
      {
        version: "v1.0",
        date: "2026-04-21 08:00",
        items: [
          { type: "new", text: "Khởi tạo game Snake trên web (HTML/JS/Canvas)" },
          { type: "new", text: "Lưu best score bằng localStorage" },
          { type: "new", text: "Điều khiển bằng Arrow Keys hoặc WASD" },
          { type: "new", text: "Tốc độ tăng dần theo điểm" },
        ],
        by: "Claude (claude-sonnet-4-6)",
      },
    ];

    // ── Render changelog ────────────────────────────────────────────
    const clList = document.getElementById('cl-list');
    CHANGELOG.forEach(entry => {
      const el = document.createElement('div');
      el.className = 'cl-entry';
      el.innerHTML = `
        <div class="cl-entry-header">
          <span class="cl-version">${entry.version}</span>
          <span class="cl-date">${entry.date}</span>
        </div>
        <ul class="cl-items">
          ${entry.items.map(i => `<li class="${i.type}">${i.text}</li>`).join('')}
        </ul>
        <div class="cl-by">by ${entry.by}</div>
      `;
      clList.appendChild(el);
    });

    // ── Tab switching ───────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
        if (btn.dataset.tab === 'scores') renderScores();
      });
    });

    // ── High Score Board ─────────────────────────────────────────────
    const MAX_BOARD = 5;
    const MEDALS = ['🥇', '🥈', '🥉', '4', '5'];

    function loadScores() {
      try { return JSON.parse(localStorage.getItem('snake_scores') || '[]'); }
      catch { return []; }
    }

    function saveScoreBoard(s) {
      if (s <= 0) return null;
      const scores = loadScores();
      scores.push(s);
      scores.sort((a, b) => b - a);
      const trimmed = scores.slice(0, MAX_BOARD);
      localStorage.setItem('snake_scores', JSON.stringify(trimmed));
      return trimmed.indexOf(s) + 1;
    }

    function renderScores() {
      const list = document.getElementById('score-list');
      const scores = loadScores();
      if (scores.length === 0) {
        list.innerHTML = '<div class="score-empty">No scores yet — play a game!</div>';
        return;
      }
      list.innerHTML = scores.map((s, i) => `
        <div class="score-row">
          <span class="score-rank">${MEDALS[i]}</span>
          <span class="score-val">${s}</span>
        </div>
      `).join('');
    }

    // ── Color themes ─────────────────────────────────────────────────
    const THEMES = {
      classic: {
        bg: '#111', grid: '#1a1a1a', border: 'rgba(74,222,128,0.2)',
        foodColor: '#f87171',
        snakeHead: '#4ade80', snakeHue: 140,
        wrapGlow: 'rgba(74,222,128,0.2)',
        comboColor: '#facc15', comboMaxColor: '#f59e0b',
      },
      neon: {
        bg: '#080c14', grid: '#0d1525', border: 'rgba(34,211,238,0.25)',
        foodColor: '#f472b6',
        snakeHead: '#22d3ee', snakeHue: 195,
        wrapGlow: 'rgba(34,211,238,0.25)',
        comboColor: '#a78bfa', comboMaxColor: '#7c3aed',
      },
      ocean: {
        bg: '#08111c', grid: '#0e1c2a', border: 'rgba(96,165,250,0.25)',
        foodColor: '#34d399',
        snakeHead: '#60a5fa', snakeHue: 220,
        wrapGlow: 'rgba(96,165,250,0.25)',
        comboColor: '#6ee7b7', comboMaxColor: '#059669',
      },
    };

    let currentTheme = 'classic';

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTheme = btn.dataset.theme;
        document.querySelector('canvas').style.background = THEMES[currentTheme].bg;
      });
    });

    // ── Game ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const overlayRank = document.getElementById('overlay-rank');
    const btn = document.getElementById('btn');
    const wrapBtn = document.getElementById('wrap-btn');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;
    const COMBO_WINDOW = 3500;
    const MAX_COMBO = 3;
    const POWERUP_DURATION = 6000;
    const POWERUP_CHANCE = 0.30;

    const DIRS = {
      ArrowUp:    [0, -1], w: [0, -1],
      ArrowDown:  [0,  1], s: [0,  1],
      ArrowLeft:  [-1, 0], a: [-1,  0],
      ArrowRight: [1,  0], d: [1,   0],
    };

    let snake, dir, nextDir, food, score, best, loopId, speed, particles;
    let powerup, powerupTimeout;
    let combo, lastFoodTime;
    let wrapMode = false;
    let paused = false;
    let puPulse = 0;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    // ── Wrap mode toggle ─────────────────────────────────────────────
    wrapBtn.addEventListener('click', () => {
      wrapMode = !wrapMode;
      wrapBtn.classList.toggle('on', wrapMode);
    });

    // ── Helpers ──────────────────────────────────────────────────────
    function randFood(sn) {
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (
        sn.some(s => s[0] === pos[0] && s[1] === pos[1]) ||
        (powerup && pos[0] === powerup[0] && pos[1] === powerup[1])
      );
      return pos;
    }

    function maybeSpawnPowerup() {
      if (powerup || Math.random() > POWERUP_CHANCE) return;
      let pos;
      do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
      } while (
        snake.some(s => s[0] === pos[0] && s[1] === pos[1]) ||
        (pos[0] === food[0] && pos[1] === food[1])
      );
      powerup = pos;
      powerupTimeout = setTimeout(() => { powerup = null; }, POWERUP_DURATION);
    }

    // ── Particle system ───────────────────────────────────────────────
    function spawnParticles(gx, gy, golden) {
      const cx = gx * CELL + CELL / 2;
      const cy = gy * CELL + CELL / 2;
      const count = golden ? 22 : 14;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
        const spd = (golden ? 2.8 : 1.8) + Math.random() * 2.8;
        const hue = golden ? 35 + Math.random() * 25 : Math.random() * 60 + 10;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          hue,
          r: golden ? 4.5 : 3.5,
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.vx *= 0.96;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = `hsl(${p.hue}, 90%, 62%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Pause ────────────────────────────────────────────────────────
    function togglePause() {
      paused = !paused;
      if (paused) {
        clearTimeout(loopId);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#facc15';
        ctx.font = 'bold 28px "Segoe UI", sans-serif';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 14);
        ctx.fillStyle = '#555';
        ctx.font = '13px "Segoe UI", sans-serif';
        ctx.fillText('Press Space or P to resume', canvas.width / 2, canvas.height / 2 + 14);
        ctx.textBaseline = 'alphabetic';
      } else {
        loop();
      }
    }

    // ── Game lifecycle ────────────────────────────────────────────────
    function startGame() {
      snake = [[Math.floor(COLS / 2), Math.floor(ROWS / 2)]];
      dir = [1, 0];
      nextDir = [1, 0];
      powerup = null;
      clearTimeout(powerupTimeout);
      food = randFood(snake);
      score = 0;
      speed = 120;
      particles = [];
      combo = 1;
      lastFoodTime = 0;
      paused = false;
      scoreEl.textContent = 0;
      overlay.style.display = 'none';
      overlayRank.textContent = '';
      if (loopId) clearTimeout(loopId);
      loop();
    }

    function loop() {
      update();
      draw();
      loopId = setTimeout(loop, speed);
    }

    function update() {
      dir = nextDir;
      let head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

      if (wrapMode) {
        head[0] = (head[0] + COLS) % COLS;
        head[1] = (head[1] + ROWS) % ROWS;
      } else {
        if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return endGame();
      }

      if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return endGame();

      snake.unshift(head);

      if (head[0] === food[0] && head[1] === food[1]) {
        const now = Date.now();
        if (lastFoodTime > 0 && now - lastFoodTime < COMBO_WINDOW) {
          combo = Math.min(combo + 1, MAX_COMBO);
        } else {
          combo = 1;
        }
        lastFoodTime = now;
        score += 10 * combo;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snake_best', best);
        }
        spawnParticles(food[0], food[1], false);
        food = randFood(snake);
        speed = Math.max(60, speed - 2);
        maybeSpawnPowerup();
      } else if (powerup && head[0] === powerup[0] && head[1] === powerup[1]) {
        snake.pop();
        clearTimeout(powerupTimeout);
        powerup = null;
        score += 50;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snake_best', best);
        }
        spawnParticles(head[0], head[1], true);
      } else {
        snake.pop();
      }

      updateParticles();
    }

    function draw() {
      const t = THEMES[currentTheme];
      ctx.fillStyle = t.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = t.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Wrap mode border glow
      if (wrapMode) {
        ctx.strokeStyle = t.wrapGlow;
        ctx.lineWidth = 3;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
      }

      drawParticles();

      // Food
      const [fx, fy] = food;
      ctx.fillStyle = t.foodColor;
      ctx.beginPath();
      ctx.arc(fx * CELL + CELL / 2, fy * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Power-up (pulsing gold)
      if (powerup) {
        puPulse += 0.15;
        const pr = CELL / 2 - 1 + Math.sin(puPulse) * 2;
        const [px, py] = powerup;
        const cx = px * CELL + CELL / 2;
        const cy = py * CELL + CELL / 2;
        ctx.shadowColor = '#fbbf24';
        ctx.shadowBlur = 14;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr);
        grad.addColorStop(0, '#fffbeb');
        grad.addColorStop(1, '#f59e0b');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, pr, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Snake
      snake.forEach(([x, y], i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = i === 0
          ? t.snakeHead
          : `hsl(${t.snakeHue - ratio * 40}, 70%, ${50 - ratio * 15}%)`;
        ctx.beginPath();
        ctx.roundRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });

      // Combo HUD
      if (combo > 1 && lastFoodTime > 0) {
        const age = Date.now() - lastFoodTime;
        if (age < COMBO_WINDOW) {
          const alpha = Math.max(0, 1 - age / COMBO_WINDOW);
          ctx.globalAlpha = alpha;
          ctx.font = 'bold 13px "Segoe UI", sans-serif';
          ctx.textAlign = 'right';
          ctx.fillStyle = combo === MAX_COMBO ? t.comboMaxColor : t.comboColor;
          ctx.fillText(`${combo}× COMBO`, canvas.width - 8, 20);
          ctx.globalAlpha = 1;
        }
      }
      ctx.textAlign = 'left';
    }

    function endGame() {
      clearTimeout(loopId);
      clearTimeout(powerupTimeout);
      powerup = null;
      paused = false;
      const rank = saveScoreBoard(score);
      overlayTitle.textContent = 'GAME OVER';
      overlaySub.textContent = `Score: ${score}`;
      overlayRank.textContent = rank ? `You ranked #${rank} on the board!` : '';
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
        if (overlay.style.display === 'none') {
          e.preventDefault();
          togglePause();
        }
        return;
      }
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (paused) return;
      if (d[0] === -dir[0] && d[1] === -dir[1]) return;
      nextDir = d;
    });
  </script>
</body>
</html>
